<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FAF9F5">
<script>(function(){try{var t=localStorage.getItem("snb_theme")||"";var e=document.documentElement;if(t==="dark")e.className+=(e.className?" ":"")+"theme-dark";else if(t==="light")e.className+=(e.className?" ":"")+"theme-light";var d=t==="dark"||(t!=="light"&&window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches);var m=document.querySelector("meta[name=theme-color]");if(m)m.setAttribute("content",d?"#1B1C1E":"#FAF9F5");}catch(e){}})();</script>

<meta name="apple-mobile-web-app-capable" content="yes">

  <script src="app.js?v=15"></script>
  <script>
  /* installable PWA: register the /app/-scoped service worker; reload once when a
     new shell takes control so updates propagate without a manual reinstall. */
  if('serviceWorker' in navigator){
    let _swReloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(!_swReloaded){_swReloaded=true;location.reload();} });
    addEventListener('load',()=>{
      navigator.serviceWorker.register('sw.js').then(reg=>{ try{reg.update();}catch(e){} }).catch(()=>{});
    });
  }
  </script>
