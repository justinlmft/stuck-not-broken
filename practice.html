<title>A guided practice — Stuck Not Broken</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root{
  --bone:#FAF9F5;--bone-deep:#F0EEE7;--hairline:#D8D2C2;--ink:#1A1F2A;--ink-80:#3A3F4A;--muted:#5E5A4E;--link:#0645AD;
  --leaf:#5BA070;--amber:#D29A4A;--sky:#5891C5;
  --btn-hover:#2A3040;--rbtn:10px;--rcard:14px;
  --ease:cubic-bezier(.2,.6,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bone);color:var(--ink);
  font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;
  min-height:100svh;overflow-y:auto;overscroll-behavior:none;
}
.page{width:100%;max-width:600px;margin:0 auto;min-height:100svh;padding:clamp(15px,3vh,30px) 28px clamp(16px,3vh,28px);display:flex;flex-direction:column}

/* ───── brand bar ───── */
.brand{display:flex;align-items:center;gap:12px;margin:0 0 clamp(16px,3.6vh,30px);flex:none}
.brand .mark{height:21px;width:auto;display:block}
.mark path{fill:var(--ink);transition:fill .4s var(--ease)}
.mark.mark-sky .g-heart{fill:var(--sky)}
.mark.mark-amber .g-bolt,.mark.mark-amber .g-x{fill:var(--amber)}
.brand-tag{font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);padding-left:12px;border-left:1px solid var(--hairline)}
.eyebrow{font-size:12.5px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.chooser .block>.eyebrow{display:flex;align-items:center;gap:8px;color:var(--trk-ink,var(--ink-80))}
.chooser .eyebrow::before{content:"";width:16px;height:2px;border-radius:1px;background:var(--trk,var(--muted));flex:none}

/* ───── setup layout (fits one screen) ───── */
.screen{display:flex;flex-direction:column;flex:1;min-height:0}
#setup{justify-content:flex-end;gap:clamp(14px,2.6vh,24px)}
.hidden{display:none !important}

/* zero-decision entry */
.entry{flex:1;display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-start;gap:10px;align-content:center}
.btn.lead{flex:1 1 0;min-width:150px;padding:14px 20px;font-size:16px;border-radius:12px}
@media (max-width:440px){
  .entry{flex-direction:column;align-items:stretch;justify-content:center}
  .btn.lead{flex:none;width:100%}
}
.choose-link{background:none;border:0;font:inherit;font-size:14px;color:var(--link);cursor:pointer;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px;text-decoration-color:rgba(6,69,173,.45);padding:6px;margin-top:8px;transition:text-decoration-color var(--ease) .2s}
.choose-link:hover{text-decoration-color:var(--link)}
.choose-link:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}
.choose-link.back{align-self:flex-start;margin:0 0 2px;color:var(--muted);text-decoration:none}
.choose-link.back:hover{color:var(--ink)}
/* chooser hidden until the user opts into deciding */
.chooser{display:flex;flex:1;min-height:0;flex-direction:column;justify-content:flex-end;gap:clamp(13px,2.4vh,22px)}
#setup.choosing .entry{display:none}
#setup.choosing .chooser{display:flex;animation:riseIn .5s var(--ease)}

/* practice tabs — quiet, only earns weight when stacking */
.tabs{display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:none}
.tab{font:inherit;font-size:13px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--ink-80);border:1px solid var(--hairline);border-radius:8px;padding:6px 13px;display:inline-flex;align-items:center;gap:8px;transition:border-color var(--ease) .2s,color var(--ease) .2s,background var(--ease) .2s}
.tab:hover{color:var(--ink)}
.tab.track-sky{border-color:rgba(88,145,197,.5)}
.tab.track-amber{border-color:rgba(210,154,74,.55)}
.tab.on{border-width:1.5px;padding:5.5px 12.5px;color:var(--ink);font-weight:500}
.tab.on.track-sky{border-color:var(--sky)}
.tab.on.track-amber{border-color:var(--amber)}
.tab.is-opt{color:var(--muted)}
.tab.is-opt.on{color:var(--ink)}
.tab:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.tab.add{color:var(--muted);border-style:dashed;font-weight:500}
.tab.add:hover{color:var(--ink);border-color:var(--ink-80)}
.tab .x{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;margin-right:-4px;border-radius:50%;color:var(--muted);font-size:14px;line-height:1}
.tab .x:hover{color:var(--ink)}
/* when there's a single practice, the lone "Your practice" tab is just a quiet label */
.tabs[data-single] .tab.on{border-color:transparent;padding-left:0;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.12em;font-size:11px}

/* ───── primary choices: radio rows ───── */
/* first-run orientation — only on the calm, unchosen view */
.welcome{font-size:16px;line-height:1.5;color:var(--ink-80);margin:0 0 2px;max-width:23em;text-wrap:pretty}
.chooser.picked .welcome{display:none}
.block{margin:0}
.block>.eyebrow{display:block;margin-bottom:11px}
.choices{display:flex;flex-direction:column}
.choices .opt{margin-bottom:10px}
.choices .opt:last-child{margin-bottom:0}
.opt{
  display:flex;align-items:center;width:100%;text-align:left;
  font:inherit;color:inherit;cursor:pointer;
  background:transparent;border:1px solid var(--hairline);border-radius:var(--rcard);
  padding:19px 22px;max-height:140px;overflow:hidden;
  transition:border-color var(--ease) .2s,border-width var(--ease) .2s,box-shadow var(--ease) .2s,max-height var(--ease) .35s,opacity var(--ease) .3s,padding var(--ease) .35s,margin var(--ease) .35s;
}
.opt:not(.on):hover{border-color:var(--ink-80);box-shadow:inset 0 0 0 1px var(--ink-80)}
.opt.track-sky.on:hover{box-shadow:inset 0 0 0 1px var(--sky)}
.opt.track-amber.on:hover{box-shadow:inset 0 0 0 1px var(--amber)}
.opt.on{border-width:2px;padding:18px 21px}
.opt.on .t{font-weight:500;color:var(--ink)}
.opt.track-sky.on{border-color:var(--sky)}
.opt.track-ink.on{border-color:var(--ink)}
.opt.track-amber.on{border-color:var(--amber)}
.opt:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.opt-text{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px}
.opt .t{display:block;flex:none;min-width:0;font-size:18px;line-height:1.3;font-weight:400;transition:font-weight var(--ease) .2s}
.opt .sub{font-size:13px;line-height:1.3;color:var(--muted);font-weight:400}
.chooser.picked .sub{display:none}
/* a clear way back once a practice is chosen */
.change-hint{display:none;font-size:12px;letter-spacing:.04em;color:var(--muted);margin-left:10px;white-space:nowrap}
.chooser.picked .opt.on .change-hint{display:inline}
/* tap affordance — right chevron to choose, rotates down on the chosen one (tap to change) */
.opt-aff{flex:none;width:9px;height:9px;margin-left:14px;border-right:1.5px solid var(--muted);border-top:1.5px solid var(--muted);transform:rotate(45deg);transition:transform var(--ease) .3s,border-color var(--ease) .2s}
.opt.on .opt-aff{border-color:var(--ink)}
.chooser.picked .opt.on .opt-aff{transform:rotate(135deg)}
/* on choosing, the other two collapse away */
.chooser.picked .choices .opt:not(.on){max-height:0;opacity:0;margin:0;padding-top:0;padding-bottom:0;border-width:0;pointer-events:none}
/* customization stays hidden until a practice is chosen — a calm first view */
.chooser:not(.picked) .summary,
.chooser:not(.picked) .surprise-all{display:none !important}
.chooser.picked .begin-help{display:none}
/* the customization area grows in and recedes smoothly — grid-rows 0fr<->1fr animates to natural height, both directions */
.reveal{max-height:0;opacity:0;overflow:hidden;pointer-events:none;transition:max-height .5s var(--ease),opacity .4s var(--ease)}
.reveal-inner{display:flex;flex-direction:column;gap:clamp(13px,2.4vh,22px)}
.chooser.picked .reveal{opacity:1;pointer-events:auto}

/* ───── contextual refinements ───── */
.refine{display:flex;flex-direction:column;gap:clamp(11px,2vh,18px);flex:none}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font:inherit;font-size:14px;cursor:pointer;text-transform:capitalize;white-space:nowrap;
  background:transparent;color:var(--muted);border:1px solid var(--hairline);
  border-radius:999px;padding:7px 15px;transition:border-color var(--ease) .2s,color var(--ease) .2s,font-weight var(--ease) .2s;
}
.chip:hover{border-color:var(--ink-80);color:var(--ink-80)}
.chip.on{border-color:var(--ink);color:var(--ink);font-weight:500}
.chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.chip.shuffle{border-style:dashed}
.surprise-all{align-self:flex-start;white-space:nowrap;font:inherit;font-size:14px;cursor:pointer;background:transparent;color:var(--muted);border:1px dashed var(--hairline);border-radius:999px;padding:7px 16px;transition:border-color var(--ease) .2s,color var(--ease) .2s}
.surprise-all:hover{border-color:var(--ink-80);color:var(--ink-80)}
.surprise-all:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* ───── more options ───── */
.adjust{margin:0}
.adjust summary{font-size:14px;color:var(--muted);cursor:pointer;list-style:none;display:inline-flex;align-items:center;gap:9px;width:auto;transition:color var(--ease) .2s}
.adjust summary:hover{color:var(--ink)}
.adjust summary::-webkit-details-marker{display:none}
.adjust summary .tw{width:7px;height:7px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);transition:transform var(--ease) .2s;margin-bottom:2px}
.adjust[open] summary .tw{transform:rotate(-135deg);margin-bottom:-3px}
.adjust[open] summary{margin-bottom:20px}
.adjust summary:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:4px}
.adjust-body{display:flex;flex-direction:column;gap:22px}

/* ───── summary + begin (pinned low) ───── */
.foot{display:flex;flex-direction:column;gap:14px;flex:none;padding-top:clamp(16px,3vh,26px)}
.summary{font-size:15px;color:var(--ink-80);margin:0;min-height:1.4em;text-wrap:pretty}
.summary b{font-weight:500;color:var(--ink)}
.begin-help{font-size:13px;color:var(--muted);margin:0;text-align:left;text-wrap:pretty}
.btn{
  font:inherit;font-weight:500;white-space:nowrap;cursor:pointer;
  background:var(--ink);color:var(--bone);border:1px solid var(--ink);
  border-radius:var(--rbtn);padding:13px 30px;transition:box-shadow var(--ease) .25s,transform var(--ease) .2s,border-color var(--ease) .2s,color var(--ease) .2s;
}
.btn:hover{box-shadow:0 0 0 2px var(--bone),0 0 0 3.5px var(--ink);transform:translateY(-1px)}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.btn.primary{width:100%;padding:18px 30px;font-size:17px;border-radius:14px}
.btn.quiet{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.quiet:hover{box-shadow:inset 0 0 0 1px var(--ink);transform:translateY(-1px)}
body.playing .brand{display:none}
/* embed mode: host app supplies the chrome */
body.embed .brand{display:none}
body.embed .page{padding-top:12px}

/* ───── player ───── */
#player{align-items:center;justify-content:center;text-align:center;gap:0}
.ringwrap{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;padding:8px 0}
#ring{width:min(82vw,360px);height:min(82vw,360px);max-height:48vh;display:block}
.phase{font-size:12.5px;text-transform:lowercase;letter-spacing:.14em;color:var(--muted);min-height:1.5em;margin:0 0 22px;opacity:0;transition:opacity 1.1s var(--ease);text-wrap:pretty;max-width:24em}
/* a quiet "it's beginning" cue so the opening silence never reads as broken */
.starting{font-size:13px;letter-spacing:.14em;text-transform:lowercase;color:var(--muted);margin:0;min-height:1.4em;text-align:center;opacity:0;transition:opacity .6s var(--ease)}
.starting.show{opacity:1;animation:startpulse 1.9s ease-in-out infinite}
@keyframes startpulse{0%,100%{opacity:.4}50%{opacity:.85}}
@media (prefers-reduced-motion:reduce){.starting.show{animation:none;opacity:.7}}
.caption{display:flex;align-items:center;justify-content:flex-start;height:5em;font-size:17px;line-height:1.65;color:var(--ink-80);max-width:none;width:100%;margin:0 0 18px;text-align:left;text-wrap:pretty;padding:0}
#player:not(.caps-on) .caption{visibility:hidden}
/* paused: the whole field dims to read as resting (not frozen); only the resume button stays full */
#player .ringwrap,#player .caption,#player .starting,#player .adjustments,#player .endings{transition:opacity .45s var(--ease)}
#player.paused .ringwrap,#player.paused .caption,#player.paused .adjustments,#player.paused .endings{opacity:.38}
.cap-text{display:inline-block;opacity:0;transform:translateY(7px);filter:blur(2px);transition:opacity .6s var(--ease),transform .6s var(--ease),filter .6s var(--ease);will-change:opacity,transform,filter}
.cap-text.in{opacity:1;transform:none;filter:blur(0)}
@media (prefers-reduced-motion:reduce){.cap-text{transform:none;filter:none;transition:opacity .4s var(--ease)}}
.controls{display:flex;flex-direction:column;gap:18px;align-items:stretch;width:100%;opacity:0;pointer-events:none;transition:opacity .55s var(--ease)}
#player.show-controls .controls{opacity:1;pointer-events:auto}
/* the controls flow in softly, one tier after the next */
#player.show-controls .controls>*{animation:riseIn .5s var(--ease) both}
#player.show-controls .controls>*:nth-child(2){animation-delay:.06s}
#player.show-controls .controls>*:nth-child(3){animation-delay:.12s}
#player{position:relative}

/* round icon button — used by the between-practices "continue" */
.iconbtn{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--ink);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:box-shadow var(--ease) .2s}
.iconbtn:hover{box-shadow:0 0 0 1px var(--ink)}
.iconbtn:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.iconbtn .ico{width:25px;height:25px;display:block;fill:var(--ink);color:var(--ink)}

/* ── primary transport: the one hero control ── */
.transport{align-self:center;width:74px;height:74px;border-radius:50%;border:1.5px solid var(--ink);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:box-shadow var(--ease) .2s,transform var(--ease) .2s}
.transport:hover{box-shadow:0 0 0 1.5px var(--ink)}
.transport:active{transform:scale(.96)}
.transport:focus-visible{outline:2px solid var(--ink);outline-offset:4px}
.transport .ico{width:27px;height:27px;display:block;fill:var(--ink);color:var(--ink)}
.transport .ico-play{display:none;margin-left:3px}
.transport.is-paused .ico-pause{display:none}
.transport.is-paused .ico-play{display:block}

/* ── adjustments: two quiet, equal setting pills ── */
/* ── settings: two equal cells on one grid row, sharing the column's edges ── */
.adjustments{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
@media (max-width:430px){.adjustments{grid-template-columns:1fr}}
.adj{display:flex;align-items:center;justify-content:space-between;width:100%;height:48px;border:1px solid var(--hairline);border-radius:12px;background:transparent;font:inherit;font-size:13px;letter-spacing:.04em;text-transform:lowercase;color:var(--muted);transition:border-color var(--ease) .2s,color var(--ease) .2s,box-shadow var(--ease) .2s}
.adj.silence{padding:0 6px 0 14px}
.adj-stepper{display:inline-flex;align-items:center;gap:2px}
.adj-label{color:var(--muted)}
.adj-val{color:var(--ink-80);font-variant-numeric:tabular-nums;min-width:2.2em;text-align:center}
.adj-step{width:40px;height:40px;border-radius:50%;border:0;background:transparent;color:var(--muted);font:inherit;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color var(--ease) .2s}
.adj-step:hover{color:var(--ink)}
.adj-step:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.captoggle{padding:0 14px;cursor:pointer}
.captoggle .cc{font-weight:500;letter-spacing:.1em;color:var(--muted);transition:color var(--ease) .2s}
.captoggle .cc-state{color:var(--muted);transition:color var(--ease) .2s}
.captoggle:hover{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
.captoggle:hover .cc,.captoggle:hover .cc-state{color:var(--ink-80)}
.captoggle.on{border-color:var(--ink)}
.captoggle.on .cc,.captoggle.on .cc-state{color:var(--ink)}
.captoggle:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* ── endings: encouraged graceful close + quiet escape ── */
.endings{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.endings .endbtn{width:100%}
.endnow{background:none;border:0;font:inherit;font-size:12.5px;letter-spacing:.1em;text-transform:lowercase;color:var(--muted);cursor:pointer;padding:4px 10px;transition:color var(--ease) .2s}
.endnow:hover{color:var(--ink);font-weight:600}
.endnow:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}

/* gentle completion */
.done{display:none;flex-direction:column;align-items:stretch;gap:10px;width:100%}
#player.finished .controls{display:none}
#player.finished .done{display:flex;animation:riseIn .55s var(--ease)}
.done .btn{width:100%}
/* terminal rest — just the settled ring and a quiet way back */
.rest{display:none;flex-direction:column;align-items:center}
#player.rested .done{display:none}
#player.rested .rest{display:flex;animation:riseIn .7s var(--ease)}

/* rest between stacked meditations */
.brk{display:none;flex-direction:column;align-items:center;gap:18px}
.brk-line{font-size:13px;text-transform:lowercase;letter-spacing:.1em;color:var(--muted);margin:0;text-align:center}
#player.breaking .controls,#player.breaking .done{display:none}
#player.breaking .brk{display:flex;animation:riseIn .55s var(--ease)}
.brk .iconbtn{width:80px;height:80px}
.brk .iconbtn .ico{width:30px;height:30px;margin-left:3px}
@media (prefers-reduced-motion:no-preference){.brk .iconbtn{animation:brkbreath 2.8s ease-in-out infinite}}
@keyframes brkbreath{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes riseIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  #player.finished .done,#player.breaking .brk,#setup.choosing .chooser,#player.show-controls .controls>*{animation:none}
  .btn:hover,.btn.quiet:hover{transform:none}
}

/* connection trouble */
.conn{position:absolute;left:0;right:0;bottom:clamp(40px,9vh,72px);text-align:center;font-size:13px;color:var(--muted);margin:0;letter-spacing:.04em;opacity:0;transition:opacity .5s var(--ease);pointer-events:none}
#player.conn-trouble .conn{opacity:.75}

@media (max-width:520px){.page{padding:18px 20px}}
/* short viewports: compress so setup still fits one screen */
@media (max-height:680px){
  #setup{gap:clamp(10px,1.8vh,16px)}
  .opt{padding:11px 16px}
  .opt.on{padding:10.5px 15.5px}
}
@media (max-height:560px){
  .page{padding:12px 22px}
  .brand{margin-bottom:8px}
  #setup{gap:9px}
  .opt{padding:9px 15px}
  .opt.on{padding:8.5px 14.5px}
  .choices{gap:6px}
  .refine{gap:9px}
  .btn.primary{padding:12px 30px}
}
/* very short (landscape phones): tighten everything */
@media (max-height:560px){
  .brand{margin-bottom:6px}
  #setup{gap:7px}
  .refine{gap:7px}
  .block>.eyebrow{margin-bottom:5px}
  .adjust[open] summary{margin-bottom:12px}
  .adjust-body{gap:14px}
  .foot{padding-top:8px;gap:9px}
  .chip{padding:6px 13px}
}
</style>
</head>

    <!-- the customizer: choose a practice, shape it, begin -->
    <div class="chooser" id="chooser">

      <p class="welcome" id="welcome">A few quiet minutes to find your way back to safety. Choose where to begin.</p>
      <div class="block">
        <div class="choices" id="exps"></div>
      </div>

        </div>
        <div class="block" id="skillwrap">
          <span class="eyebrow">the skill to practice</span>
          <div class="chips" id="skills"></div>
        </div>
      </div>

        <div class="adjust-body">
          <div class="block">

            <div class="chips" id="sils"></div>
          </div>
          <div class="block" id="descdefwrap">
            <span class="eyebrow">describe the defense?</span>
            <div class="chips" id="descdefs"></div>
          </div>
          <div class="block" id="lenwrap">

          </div>

      </details>
      </div></div>

    </div>

  <main id="player" class="screen hidden">
    <div class="ringwrap"><canvas id="ring"></canvas></div>

    <p class="caption" id="caption"><span class="cap-text" id="captext"></span></p>
    <div class="controls">
      <!-- primary transport: the one hero control -->
      <button class="transport" id="pause" aria-label="Pause"><svg class="ico ico-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="6.4" y="5" width="4.4" height="14" rx="2.2"></rect><rect x="13.2" y="5" width="4.4" height="14" rx="2.2"></rect></svg><svg class="ico ico-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6 L18 12 L8 18 Z" fill="currentColor" stroke="currentColor" stroke-width="3.4" stroke-linejoin="round"></path></svg></button>
      <!-- adjustments: silence + captions, two equal quiet pills -->
      <div class="adjustments">
        <div class="adj silence">
          <span class="adj-label">silence</span>
          <span class="adj-stepper">
            <button class="adj-step" id="lesssil" aria-label="less silence">−</button>
            <span class="adj-val" id="silnow"></span>
            <button class="adj-step" id="moresil" aria-label="more silence">+</button>
          </span>
        </div>
        <button class="adj captoggle" id="captoggle" type="button" aria-pressed="false"><span class="cc">CC</span><span class="cc-state" id="capstate">off</span></button>

      <!-- endings: graceful close, and a quiet escape -->
      <div class="endings">
        <button class="btn quiet endbtn" id="endbtn">Begin ease out</button>
        <button class="endnow" id="stopbtn" aria-label="End now">end now</button>
      </div>
    </div>

    <div class="done" id="done">
      <button class="btn quiet" id="againbtn">Go again</button>
      <button class="btn quiet" id="overbtn">Choose another</button>
      <button class="endnow" id="restbtn">end</button>
    </div>
    <!-- terminal rest: ending is an honored, complete choice -->
    <div class="rest" id="rest">
      <button class="endnow" id="restagain">begin again</button>
    </div>
    <!-- a rest between stacked meditations: waits for play -->
    <div class="brk" id="brk">
      <p class="brk-line" id="brkline"></p>
      <button class="iconbtn" id="contbtn" aria-label="Continue"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6 L18 12 L8 18 Z" fill="currentColor" stroke="currentColor" stroke-width="3.4" stroke-linejoin="round"></path></svg></button>
    </div>

    <p class="conn" id="conn">having trouble connecting. hang on…</p>
  </main>

const CLOSES=['CLOSE-01','CLOSE-02','CLOSE-03','CLOSE-04','CLOSE-05','OUTRO'];
function buildPlan(){
  const all=practices.filter(Boolean); let seq=[],phase=[],loop=false,loopFrom=0;
  all.forEach((c,ci)=>{let b=build(c),s=b.seq.slice(),p=b.phase.slice();
    const isLast=ci===all.length-1;
    const rm=x=>{const k=s.indexOf(x);if(k>=0){s.splice(k,1);p.splice(k,1);}};
    if(ci>0)rm('INTRO-01');                                  // only the first practice opens with the welcome
    if(isLast&&c.open){CLOSES.forEach(rm);}                  // open-ended: drop close+outro, loop instead

    if(isLast&&c.open&&b.loopBase){const li=s.indexOf(b.loopBase);loop=true;loopFrom=seq.length+(li>=0?li:0);}

/* a deliberate rest between stacked meditations: the next one waits for the user to press play.
   A thin wrapper around advance() pauses at a practice boundary — a 'closing'-phase clip followed by
   a non-'closing' one. Clip order and within-practice timing are untouched; only a user-gated pause is inserted. */
let inBreak=false;
const PNAME={mindfulness:'simple mindfulness',anchoring:'connecting with safety',most:'self-regulation'};
const _advanceCore=advance;
advance=function(){
  if(playing&&!inBreak&&idx>=0&&idx+1<SEQ.length&&PH[idx]==='closing'&&PH[idx+1]&&PH[idx+1]!=='closing'){
    inBreak=true;try{au.pause();}catch(e){}clearTimeout(gapTimer);inGap=false;
    // which meditation is coming up next?
    let seg=0;for(let i=1;i<=idx+1;i++){if(PH[i-1]==='closing'&&PH[i]!=='closing')seg++;}
    const nm=PNAME[(practices[seg]||{}).key]||'';
    $('brkline').textContent='practice '+(seg+1)+' of '+practices.length+(nm?' \u00b7 '+nm:'')+' next';
    clearTimeout(ctrlTimer);$('player').classList.remove('show-controls');$('player').classList.add('breaking');
    return;
  }
  return _advanceCore();
};
$('contbtn').onclick=()=>{inBreak=false;$('player').classList.remove('breaking');revealControls();_advanceCore();};

function startPlayer(){
  const o=buildPlan();SEQ=o.seq;PH=o.phase;LOOP=o.loop;LOOPFROM=o.loopFrom;buildTrackSeq();
  $('pause').classList.remove('is-paused');$('pause').setAttribute('aria-label','Pause');$('pause').style.display='';
  finished=false;paused=false;playing=true;inGap=false;idx=-1;closingNow=false;playStart=Date.now();
  showScreen('player');fitRing();renderTest();showSil();
  started=false;const _st=$('starting');if(_st){_st.textContent='beginning';_st.classList.add('show');}
  inBreak=false;$('player').classList.remove('finished','conn-trouble','breaking','rested','paused');revealControls();
  cancelAnimationFrame(rafId);ringLoop();
  advance();
}
function stopAll(){playing=false;paused=false;inGap=false;clearTimeout(gapTimer);try{au.pause();}catch(e){}cancelAnimationFrame(rafId);}

/* ─────────────────────────────────────────────────────────────────────────────
   CAPTIONS HOOK (not yet wired — needs transcripts from engineering).
   When transcripts exist, host a `captions.json` next to the clips keyed BY FILENAME,
   e.g. { "INTRO-01-a.mp3": "Welcome…", "INTRO-01-b.mp3": "Hi…", … }, fetch it once on load
   (const CAP = await (await fetch(BASE+'captions.json')).json()), then:
     1. In playCurrent() capture the chosen filename (see note there) and, if captions are on,
        set a caption element's text to CAP[file] || ''.
     2. Clear the caption on au.onended / during silence gaps (mirror the old phase-label logic).
     3. Add a captions on/off toggle in the controls (persist nothing — no localStorage).
   The player advances on each clip's real `ended`, so a per-clip line is enough for v1;
   upgrade to WebVTT cues later if timed highlighting is wanted.
   ───────────────────────────────────────────────────────────────────────────── */
/* ---- progressive captions: one phrase at a time, paced by where we are in the clip ----
   No per-word timestamps exist, so we split CAP[file] into phrases and reveal each across
   the clip's playback, weighting by phrase length (a proxy for how long it takes to say).
   Purely a renderer over CAP[file]; the sequencing/timing engine is untouched. */
let CAP_CHUNKS=[],CAP_BOUNDS=[],capShown=-1,capFadeT=null;
function splitCaption(txt){
  txt=(txt||'').trim();if(!txt)return [];
  let parts=(txt.match(/[^.!?]+[.!?]*/g)||[txt]).map(s=>s.trim()).filter(Boolean);
  const MAX=82,out=[];                                   // ease very long sentences apart at natural breaths
  parts.forEach(p=>{
    if(p.length<=MAX){out.push(p);return;}
    let buf='';
    p.split(/(?<=[,;:\u2014])\s+/).forEach(seg=>{
      if(buf&&(buf+' '+seg).trim().length>MAX){out.push(buf.trim());buf=seg;}
      else buf=buf?buf+' '+seg:seg;
    });
    if(buf.trim())out.push(buf.trim());
  });
  return out;
}
function capStart(txt){
  CAP_CHUNKS=splitCaption(txt);capShown=-1;
  let total=CAP_CHUNKS.reduce((n,s)=>n+s.length,0)||1,acc=0;
  CAP_BOUNDS=CAP_CHUNKS.map(s=>{acc+=s.length;return acc/total;});   // cumulative phrase-length fractions
  if(CAP_CHUNKS.length){capTick();if(capShown<0)capShow(0);}else capRender('');
}
function capTick(){
  if(!capsOn||paused||inGap||!CAP_CHUNKS.length)return;
  const dur=(isFinite(au.duration)&&au.duration>0)?au.duration:(DUR[SEQ[idx]]||CAP_CHUNKS.length*3);
  const prog=Math.min(1,au.currentTime/dur);
  let i=0;while(i<CAP_BOUNDS.length-1&&prog>=CAP_BOUNDS[i])i++;
  if(i!==capShown)capShow(i);
}
function capShow(i){capShown=i;capRender(CAP_CHUNKS[i]||'');}
function capClear(){CAP_CHUNKS=[];CAP_BOUNDS=[];capShown=-1;capRender('');}
function capRender(text){
  const el=$('captext');if(!el||el.textContent===text)return;
  el.classList.remove('in');                              // fade/blur the current phrase out
  clearTimeout(capFadeT);
  capFadeT=setTimeout(()=>{el.textContent=text;if(text){void el.offsetWidth;el.classList.add('in');}},260);
}
au.addEventListener('timeupdate',capTick);
/* the opening "beginning" cue clears the moment real audio starts */
au.addEventListener('playing',()=>{if(!started){started=true;const s=$('starting');if(s)s.classList.remove('show');}});

function playCurrent(){
  const b=SEQ[idx];
  const file=rand(MAN[b]);          // CAPTIONS: this is the chosen variant filename — caption key is CAP[file]
  curFile=file;capStart(CAP[file]||'');   // parse caption into phrases, reveal progressively (shown only when captions on)
  try{au.src=clipUrl(file);au.currentTime=0;const pr=au.play();if(pr&&pr.catch)pr.catch(()=>{});}catch(e){}
}
function advance(){
  if(!playing)return;
  idx++;
  if(idx>=SEQ.length){if(LOOP){idx=LOOPFROM;}else{return finish();}}
  inGap=false;
  playCurrent();updateTest();
}
au.onended=()=>{                                      // a clip finished playing, in full
  if(!playing||paused)return;
  if(!LOOP&&idx>=SEQ.length-1)return finish();         // last clip plays to its natural end — no cut
  capClear();    // clear caption during the silence gap
  gapRemain=gapAfter(SEQ[idx])*1000;gapStart=performance.now();inGap=true;
  clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},gapRemain);
};
au.onerror=()=>{                                      // a clip failed to load — skip on, don't freeze
  $('starting').classList.remove('show');
  if(!playing||paused)return;
  if(!LOOP&&idx>=SEQ.length-1)return finish();
  inGap=true;gapRemain=300;gapStart=performance.now();
  clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},300);
};
function finish(){playing=false;finished=true;finishAt=performance.now();inGap=false;clearTimeout(gapTimer);try{au.pause();}catch(e){}
  postToHost('complete');
  capClear();$('starting').classList.remove('show');
  $('pause').style.display='none';
  clearTimeout(ctrlTimer);$('player').classList.add('finished');$('player').classList.remove('conn-trouble');
}
$('pause').onclick=()=>{
  if(!playing)return;
  if(paused){ // resume
    paused=false;
    if(inGap){gapStart=performance.now();clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},gapRemain);}
    else{try{au.play();}catch(e){}}
    $('pause').classList.remove('is-paused');$('pause').setAttribute('aria-label','Pause');
    $('player').classList.remove('paused');revealControls();
  }else{ // pause
    paused=true;
    if(inGap){clearTimeout(gapTimer);gapRemain=Math.max(0,gapRemain-(performance.now()-gapStart));}
    else{try{au.pause();}catch(e){}}
    $('pause').classList.add('is-paused');$('pause').setAttribute('aria-label','Resume');
    $('player').classList.add('paused','show-controls');clearTimeout(ctrlTimer);$('starting').classList.remove('show');
  }
};
/* live silence control — adjusts the current practice's gap length on the fly */
const SILSTEPS=[2,4,6,8,10,12,16];
const nearestSil=v=>SILSTEPS.reduce((b,s)=>Math.abs(s-v)<Math.abs(b-v)?s:b,SILSTEPS[0]);
function showSil(){const e=$('silnow');if(e)e.textContent=cfg.silence+'s';}
function stepSil(d){let i=SILSTEPS.indexOf(nearestSil(cfg.silence));i=Math.max(0,Math.min(SILSTEPS.length-1,i+d));cfg.silence=SILSTEPS[i];showSil();}
$('lesssil').onclick=()=>stepSil(-1);
$('moresil').onclick=()=>stepSil(1);
$('captoggle').onclick=()=>{capsOn=!capsOn;const t=$('captoggle');$('capstate').textContent=capsOn?'on':'off';t.classList.toggle('on',capsOn);t.setAttribute('aria-pressed',capsOn?'true':'false');$('player').classList.toggle('caps-on',capsOn);if(capsOn&&curFile){capStart(CAP[curFile]||'');}else{capClear();}};

$('stopbtn').onclick=()=>{postToHost('exit');stopAll();finished=false;showScreen('setup');};   // immediate exit, no close
$('againbtn').onclick=()=>{startPlayer();};                                  // replay the same session from the top
$('overbtn').onclick=()=>{stopAll();finished=false;$('player').classList.remove('finished','breaking','conn-trouble','rested');$('setup').classList.remove('choosing');showScreen('setup');};
$('restbtn').onclick=()=>{$('player').classList.add('rested');};               // settle into a quiet close
$('restagain').onclick=()=>{stopAll();finished=false;$('player').classList.remove('finished','breaking','conn-trouble','rested');$('setup').classList.remove('choosing');showScreen('setup');};
$('endbtn').onclick=()=>{
  if(finished){stopAll();showScreen('setup');return;}
  closingNow=true;   // ease-out: the circle returns to black, confirming the close has begun
  clearTimeout(gapTimer);inGap=false;playing=true;paused=false;LOOP=false;
  $('pause').classList.remove('is-paused');$('pause').setAttribute('aria-label','Pause');
  $('player').classList.remove('paused');
  // is there another meditation queued after this point? (a practice boundary further along)
  let nextStart=-1;for(let i=idx+1;i<PH.length;i++){if(PH[i-1]==='closing'&&PH[i]!=='closing'){nextStart=i;break;}}
  const closes=['CLOSE-01','CLOSE-02','CLOSE-03','CLOSE-04','CLOSE-05'].filter(has);
  const played=SEQ.slice(0,Math.max(idx+1,0));
  const playedPH=PH.slice(0,Math.max(idx+1,0));
  if(nextStart>0){
    // gently close THIS meditation, then break into the next one
    SEQ=played.concat(closes,SEQ.slice(nextStart));
    PH=playedPH.concat(closes.map(()=>'closing'),PH.slice(nextStart));
  }else{
    // last (or only) meditation: close, sign off, then finish
    const tail=closes.concat(['OUTRO'].filter(has));
    SEQ=played.concat(tail);
    PH=playedPH.concat(tail.map(()=>'closing'));
  }
  buildTrackSeq();
  idx=played.length-1;renderTest();
  try{au.pause();}catch(e){}
  advance();
};

/* ====== focal point — whole breathing circle, two-state colour, migrating ring, reduced-motion aware ======
   The one bit of "decoration" in the app, and intentionally so: it is the practice's living focal point.
   A single whole circle breathes on a slow cycle. Its colour is BLUE while the voice is in mindfulness or
   safety and shifts to ORANGE when it turns toward the defense; the centre dot shifts with it. A faint
   second ring sits OUTSIDE the circle in mindfulness, vanishes as you settle into safety, and reappears
   INSIDE the circle at the defense — so the ring travels inward as the work deepens. No glow. */
const cv=$('ring'),g=cv.getContext('2d');
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
let rafId=null,finishAt=0;
const RING_BLUE=[88,145,197], RING_ORANGE=[210,154,74], RING_INK=[26,31,42];
/* classify the current clip into one of three moments by its id (works the same in any practice & when stacked) */
function clipState(b){
  if(!b)return 'mind';
  if(/^(INVITE|IMG-|OBST|HOLD-WATCH|DESC-DEFENSE|NUMB-OK|PEND-DEFENSE|PEND-TO-DEFENSE)/.test(b))return 'defense';  // the harder edge
  if(/^(CLOSE-|OUTRO)/.test(b))return 'closing';                                                                 // easing out — the circle returns to black
  if(/^(INTRO-01|MIND-0[1-8])$/.test(b))return 'mind';                                                            // gentle noticing prompts
  return 'safety';                                                                                                 // anchoring / resting in safety
}
const RING_STATE={mind:{col:RING_INK,outer:1,inner:0},safety:{col:RING_BLUE,outer:0,inner:0},defense:{col:RING_ORANGE,outer:0,inner:1},closing:{col:RING_INK,outer:0,inner:0}};
let _rc=RING_INK.slice(), _ro=1, _ri=0, _lastState='mind', _breath=0.5, _breath2=0.5;   // eased current colour / outer-ring / inner-ring opacity; held breath values
function buildTrackSeq(){}                                     // (legacy no-op — colour now follows each clip's state, computed live)
function fitRing(){const dpr=devicePixelRatio||1;const w=cv.clientWidth,h=cv.clientHeight;cv.width=w*dpr;cv.height=h*dpr;g.setTransform(dpr,0,0,dpr,0,0);}
addEventListener('resize',()=>{if(!$('player').classList.contains('hidden'))fitRing();});
function ringLoop(){
  rafId=requestAnimationFrame(ringLoop);
  const W=cv.clientWidth,H=cv.clientHeight,cx=W/2,cy=H/2;g.clearRect(0,0,W,H);
  const unit=Math.min(W,H);
  const t=performance.now()/1000;
  const moving=playing&&!paused&&!reduce;
  if(moving){_breath=Math.sin(t*0.55)*0.5+0.5;_breath2=Math.sin(t*0.41+0.7)*0.5+0.5;}  // when paused/reduced, hold the last value instead of snapping to a default shape
  const breath=_breath, breath2=_breath2;
  // ease toward the current clip's state (a quick, deliberate shift)
  const s=RING_STATE[finished?_lastState:(closingNow?(_lastState='closing'):(_lastState=clipState(SEQ[idx])))];
  for(let i=0;i<3;i++)_rc[i]+=(s.col[i]-_rc[i])*0.10;
  _ro+=(s.outer-_ro)*0.08; _ri+=(s.inner-_ri)*0.08;
  // at the end, the ring closes inward and fades, settling into the centre dot
  let e=0;
  if(finished){const ct=Math.min(1,(performance.now()-finishAt)/2200);e=1-Math.pow(1-ct,3);}
  const [r,gr,bl]=_rc.map(Math.round);
  const rgba=(a)=>'rgba('+r+','+gr+','+bl+','+a+')';
  g.lineCap='round';
  const dotR=Math.max(2.5,unit*0.02);
  // the migrating second ring — faint thread, outside for mindfulness / inside for defense (fades out as the session closes)
  if(_ro>0.01){g.strokeStyle=rgba(0.5*_ro*(1-e));g.lineWidth=1.5;g.beginPath();g.arc(cx,cy,unit*(0.30+0.13*breath2),0,Math.PI*2);g.stroke();}
  if(_ri>0.01){g.strokeStyle=rgba(0.6*_ri*(1-e));g.lineWidth=1.6;g.beginPath();g.arc(cx,cy,unit*(0.115+0.055*breath2),0,Math.PI*2);g.stroke();}
  // the whole breathing circle — collapsing into the dot at the very end
  const breathR=(unit*(0.20+0.12*breath))*(1-e)+dotR*e;
  g.strokeStyle=rgba(0.9*(1-e));g.lineWidth=2.5;g.beginPath();g.arc(cx,cy,breathR,0,Math.PI*2);g.stroke();
  // centre dot — shifts colour with the state, a touch deeper for presence
  g.fillStyle='rgb('+Math.round(r*0.82)+','+Math.round(gr*0.82)+','+Math.round(bl*0.82)+')';
  g.beginPath();g.arc(cx,cy,dotR,0,Math.PI*2);g.fill();
}

/* ====== embed mode: let a host app (Stuck Not Broken) preselect a practice,
   auto-start, hide this page's own chrome, and learn how the session ended. ====== */
let playStart=0;
function postToHost(event){
  try{
    if(window.parent===window)return;
    const minutes=playStart?Math.max(1,Math.round((Date.now()-playStart)/60000)):null;
    window.parent.postMessage({type:'snb-weaver',event,minutes},'*');
  }catch(e){}
}
(function initEmbed(){
  const q=new URLSearchParams(location.search);
  if(q.get('embed')==='1'){document.body.classList.add('embed');}
  const pk=q.get('practice');
  if(pk&&EXP[pk]){
    const c=fresh(pk);
    const sense=q.get('sense'); if(sense&&allSenses.indexOf(sense)>=0)c.sense=sense;
    const skill=q.get('skill'); if(skill&&SKILLS.most&&SKILLS.most.some(x=>x[0]===skill))c.skill=skill;
    const sil=parseInt(q.get('silence'),10); if(!isNaN(sil))c.silence=sil;
    practices=[c];active=0;picked=true;cfg=practices[active];
  }
  renderSetup();
  if(q.get('autostart')==='1'){startPlayer();}
})();
</script>
